name: Deploy to EC2

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout (optional but good practice)
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Configure AWS via OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ✅ Debug AWS (optional but useful)
      - name: Verify AWS Identity
        run: |
          echo "AWS Identity:"
          aws sts get-caller-identity

      # ✅ Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu   # 🔥 change if Amazon Linux → ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          debug: true
          script: |
            set -e

            echo "=== Deployment Started ==="

            # ✅ Install dependencies if missing (first-time setup)
            if ! command -v git &> /dev/null; then
              echo "Installing git..."
              sudo apt update && sudo apt install -y git
            fi

            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # ✅ Ensure Docker Compose exists
            docker compose version || echo "Docker Compose not found"

            cd ~

            echo "Checking repository..."

            # ✅ Clone repo if not exists
            if [ ! -d "Docker-Mern" ]; then
              echo "Cloning repository..."
              git clone https://github.com/naveedwani/Docker-Mern.git
            else
              echo "Repository exists"
            fi

            cd Docker-Mern

            echo "Current directory: $(pwd)"
            ls -la

            # ✅ Pull latest code
            git pull origin master

            # ✅ Stop existing containers
            echo "Stopping containers..."
            docker compose down || true

            # ✅ Build & run
            echo "Building and starting containers..."
            docker compose up -d --build

            # ✅ Verify
            echo "Container status:"
            docker compose ps

            echo "=== Deployment Completed Successfully ==="
